services:
  postgres:
    image: docker.io/postgres:17
    container_name: mx-address-resolver-db
    environment:
      POSTGRES_DB: mx_address_resolver
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db/catalogos_mx.sql:/docker-entrypoint-initdb.d/01-catalogos_mx.sql:ro,Z
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: